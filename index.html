<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة السائق - استقبال الطلبات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-900 text-white p-4">
    <h1 class="text-2xl font-black mb-6 text-blue-400">طلبات الركاب المباشرة</h1>
    <div id="orders-list" class="space-y-4"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCyRku2u6gIuj6itpDb7NXIaF-MtBmMomo",
            authDomain: "ridenowapp-eadf0.firebaseapp.com",
            projectId: "ridenowapp-eadf0",
            databaseURL: "https://ridenowapp-eadf0-default-rtdb.firebaseio.com/",
            storageBucket: "ridenowapp-eadf0.firebasestorage.app",
            messagingSenderId: "184047350605",
            appId: "1:184047350605:web:622b9f7d8b4b2af95a7d04"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // الاستماع للطلبات الجديدة
        database.ref('rides').on('value', (snapshot) => {
            const ordersList = document.getElementById('orders-list');
            ordersList.innerHTML = '';
            const data = snapshot.val();
            
            for (let id in data) {
                if(data[id].status === 'pending') {
                    const card = `
                        <div class="bg-slate-800 p-5 rounded-2xl border-r-4 border-green-500 shadow-xl">
                            <p class="text-sm text-gray-400">طلب جديد فـ ${data[id].time}</p>
                            <p class="text-lg font-bold">📍 الوجهة: ${data[id].destination}</p>
                            <p class="mb-4 text-blue-300">📱 هاتف: ${data[id].phone}</p>
                            <button onclick="acceptRide('${id}', '${data[id].phone}')" class="w-full bg-green-600 py-3 rounded-xl font-bold">قبول الرحلة وتساب</button>
                        </div>
                    `;
                    ordersList.innerHTML += card;
                    // هنا تقدر تزيد صوت تنبيه
                }
            }
        });

        function acceptRide(id, phone) {
            database.ref('rides/' + id).update({ status: 'accepted' });
            window.open(`https://wa.me/${phone}?text=مرحباً، أنا السائق، قبلت طلبك للذهاب إلى الوجهة المحددة.`);
        }
    </script>
</body>
</html>
