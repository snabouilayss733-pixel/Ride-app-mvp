<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>RIDENOW - الراكب</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-950 text-white overflow-hidden">
    <div id="map" class="h-screen w-full"></div>
    <div id="ui-box" class="fixed bottom-0 w-full bg-slate-900 p-6 rounded-t-[2.5rem] shadow-2xl z-10 border-t border-yellow-500/20">
        <div id="step-1">
            <h1 class="text-center text-yellow-500 font-black mb-4">RIDENOW 🚕</h1>
            <input type="text" id="user-name" placeholder="👤 اسمك" class="w-full p-4 mb-2 bg-slate-800 rounded-2xl border-none">
            <input type="tel" id="phone" placeholder="📞 رقم الجوال" class="w-full p-4 mb-2 bg-slate-800 rounded-2xl border-none">
            <div id="price-card" class="hidden text-center p-3 bg-yellow-500/10 rounded-xl mb-3 border border-yellow-500/20">
                <span id="price-val" class="text-2xl font-black text-yellow-500">0</span> <span class="text-yellow-500">SAR</span>
            </div>
            <button onclick="sendOrder()" id="main-btn" class="w-full bg-yellow-600 py-5 rounded-2xl font-black text-xl text-black">اطلب الآن</button>
        </div>
        <div id="step-2" class="hidden text-center py-4">
            <div class="animate-pulse text-4xl mb-4">🚕</div>
            <h2 id="status-msg" class="text-xl font-bold text-yellow-500">جاري البحث عن كابتن...</h2>
            <div id="driver-info" class="hidden mt-4 p-4 bg-slate-800 rounded-2xl">
                <button onclick="confirmRide()" class="bg-green-600 w-full py-4 rounded-xl font-bold">تأكيد الركوب ✅</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCyRku2u6gIuj6itDb7NXIaF-MtBmMomo", authDomain: "ridenowapp-eadf0.firebaseapp.com", projectId: "ridenowapp-eadf0", databaseURL: "https://ridenowapp-eadf0-default-rtdb.firebaseio.com", storageBucket: "ridenowapp-eadf0.appspot.com", messagingSenderId: "184047350605", appId: "1:184047350605:web:622b9f7d8b4b2af95a7d04" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let map = L.map('map', {zoomControl: false}).setView([24.7136, 46.6753], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        let uPos, currentOrderId, driverMarkers = {};

        // رادار السائقين
        database.ref('drivers_online').on('value', snap => {
            Object.values(driverMarkers).forEach(m => map.removeLayer(m));
            snap.forEach(child => {
                const d = child.val();
                driverMarkers[child.key] = L.marker([d.lat, d.lng], {icon: L.divIcon({html: '🚕', className: 'text-2xl'})}).addTo(map);
            });
        });

        navigator.geolocation.getCurrentPosition(p => {
            uPos = [p.coords.latitude, p.coords.longitude];
            map.setView(uPos, 15);
            L.circleMarker(uPos, {color: '#eab308', radius: 8}).addTo(map);
        });

        map.on('click', e => {
            const dist = map.distance(uPos, e.latlng) / 1000;
            const price = Math.floor(7 + (dist * 2.5));
            document.getElementById('price-card').classList.remove('hidden');
            document.getElementById('price-val').innerText = price;
            window.lastPrice = price;
            window.dest = e.latlng;
            L.marker(e.latlng).addTo(map);
        });

        function sendOrder() {
            const name = document.getElementById('user-name').value;
            const ph = document.getElementById('phone').value;
            if(!name || !ph || !window.dest) return alert("سجل بياناتك وحدد الموقع!");
            
            localStorage.setItem('riderName', name);
            localStorage.setItem('riderPhone', ph);

            currentOrderId = "ord_" + Date.now();
            database.ref('orders/' + currentOrderId).set({ name, ph, price: window.lastPrice, lat: uPos[0], lng: uPos[1], status: 'waiting' });
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');

            database.ref('orders/' + currentOrderId).on('value', snap => {
                const o = snap.val();
                if(o.status === 'accepted') {
                    document.getElementById('status-msg').innerText = "تم قبول الطلب! الكابتن قادم";
                    document.getElementById('driver-info').classList.remove('hidden');
                }
                if(o.status === 'completed') { alert("وصلت بالسلامة!"); location.reload(); }
            });
        }
        function confirmRide() { database.ref('orders/' + currentOrderId).update({status: 'in_progress'}); }
    </script>
</body>
</html>
