<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RideNow - اطلب رحلتك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen p-4">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        <h1 class="text-3xl font-black text-center mb-8 text-blue-400">RideNow 🚕</h1>
        
        <div class="space-y-6">
            <div>
                <label class="block text-sm font-medium mb-2">رقم الهاتف</label>
                <input type="tel" id="phone" placeholder="0600000000" 
                    class="w-full p-4 rounded-xl bg-slate-700 border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">إلى أين تريد الذهاب؟</label>
                <input type="text" id="destination" placeholder="مثلاً: وسط المدينة" 
                    class="w-full p-4 rounded-xl bg-slate-700 border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <button onclick="sendOrder()" id="orderBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg active:scale-95">
                البحث عن سائق
            </button>
            
            <p id="status" class="text-center text-sm text-slate-400 hidden">جاري إرسال طلبك...</p>
        </div>
    </div>

    <script>
        // الإعدادات الخاصة بـ Firebase ديالك
        const firebaseConfig = {
            apiKey: "AIzaSyCyRku2u6gIuj6itDb7NXIaF-MtBmMomo",
            authDomain: "ridenowapp-eadf0.firebaseapp.com",
            projectId: "ridenowapp-eadf0",
            databaseURL: "https://ridenowapp-eadf0-default-rtdb.firebaseio.com",
            storageBucket: "ridenowapp-eadf0.appspot.com",
            messagingSenderId: "184047350605",
            appId: "1:184047350605:web:622b9f7d8b4b2af95a7d04"
        };

        // تفعيل Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function sendOrder() {
            const phone = document.getElementById('phone').value;
            const destination = document.getElementById('destination').value;
            const btn = document.getElementById('orderBtn');
            const status = document.getElementById('status');

            if (phone && destination) {
                btn.disabled = true;
                btn.innerText = "تم إرسال الطلب ✅";
                status.classList.remove('hidden');

                // إرسال البيانات لـ Firebase
                const newOrderRef = database.ref('orders').push();
                newOrderRef.set({
                    phone: phone,
                    destination: destination,
                    status: "waiting",
                    time: new Date().toLocaleTimeString()
                }).then(() => {
                    alert("طلبك وصل! السائق غايتصل بيك قريباً.");
                }).catch((error) => {
                    alert("وقع مشكل: " + error.message);
                    btn.disabled = false;
                    btn.innerText = "البحث عن سائق";
                });
            } else {
                alert("عافاك عمر المعلومات كاملة");
            }
        }
    </script>
</body>
</html>
