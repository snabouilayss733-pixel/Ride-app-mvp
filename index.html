<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ride App - دخول واتساب</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
            <h1 class="text-2xl font-bold mb-6 text-center">تسجيل الدخول برقم الواتساب</h1>
            
            <div id="phone-step">
                <label class="block mb-2">رقم الواتساب مع مفتاح الدولة</label>
                <input type="tel" id="phone" placeholder="9665xxxxxxxx" 
                       class="w-full p-3 border rounded-lg mb-4 text-left" dir="ltr">
                <button onclick="sendOTP()" id="sendBtn"
                        class="w-full bg-green-500 text-white p-3 rounded-lg hover:bg-green-600 font-bold">
                    أرسل كود على واتساب
                </button>
            </div>

            <div id="otp-step" class="hidden">
                <p class="text-sm text-gray-600 mb-4 text-center">وصلتك رسالة على واتساب فيها الكود</p>
                <label class="block mb-2">أدخل الكود المكون من 6 أرقام</label>
                <input type="text" id="otp" placeholder="123456" 
                       class="w-full p-3 border rounded-lg mb-4 text-center text-2xl tracking-widest" maxlength="6">
                <button onclick="verifyOTP()" 
                        class="w-full bg-blue-500 text-white p-3 rounded-lg hover:bg-blue-600 font-bold">
                    تحقق ودخول
                </button>
                <button onclick="backToPhone()" class="w-full mt-3 text-sm text-gray-500">
                    ← تغيير الرقم
                </button>
            </div>
