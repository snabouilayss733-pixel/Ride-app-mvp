<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>RideNow - اطلب رحلة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-950 text-white font-sans overflow-hidden">
    <div class="flex flex-col h-screen">
        <div id="map" class="flex-grow"></div>

        <div class="bg-slate-900 p-6 rounded-t-[2.5rem] shadow-2xl border-t border-slate-800 space-y-4 pb-10">
            <h1 class="text-2xl font-black text-blue-500 italic text-center">RIDENOW</h1>
            
            <div class="space-y-2">
                <div class="flex items-center bg-slate-800 rounded-2xl p-4 gap-3">
                    <span class="text-blue-500">📍</span>
                    <input type="text" id="start-loc" placeholder="موقع الانطلاق (تلقائي)" class="bg-transparent border-none w-full text-sm focus:ring-0">
                </div>
                <div class="flex items-center bg-slate-800 rounded-2xl p-4 gap-3">
                    <span class="text-red-500">🏁</span>
                    <input type="text" id="end-loc" placeholder="إلى أين ستذهب؟" class="bg-transparent border-none w-full text-sm focus:ring-0 font-bold">
                </div>
            </div>

            <div id="price-card" class="hidden flex justify-between items-center bg-blue-600/10 p-4 rounded-2xl border border-blue-500/20">
                <span class="font-bold text-slate-400">الثمن المقدر:</span>
                <span id="price-val" class="text-3xl font-black text-blue-500">-- DH</span>
            </div>

            <input type="tel" id="phone" placeholder="📞 رقم الهاتف للتواصل" class="w-full p-4 bg-slate-800 rounded-2xl border-none font-mono text-center">

            <button onclick="sendOrder()" id="mainBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-5 rounded-2xl font-black text-xl transition-all active:scale-95 shadow-lg shadow-blue-900/20">
                تأكيد طلب الرحلة
            </button>
            <p id="status" class="text-center font-bold text-yellow-500 hidden"></p>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCyRku2u6gIuj6itDb7NXIaF-MtBmMomo", authDomain: "ridenowapp-eadf0.firebaseapp.com", projectId: "ridenowapp-eadf0", databaseURL: "https://ridenowapp-eadf0-default-rtdb.firebaseio.com", storageBucket: "ridenowapp-eadf0.appspot.com", messagingSenderId: "184047350605", appId: "1:184047350605:web:622b9f7d8b4b2af95a7d04" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let map = L.map('map', {zoomControl: false}).setView([33.5731, -7.5898], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let uPos, dPos, router;

        // تحديد موقع الراكب تلقائياً
        navigator.geolocation.getCurrentPosition(p => {
            uPos = [p.coords.latitude, p.coords.longitude];
            map.setView(uPos, 16);
            L.circleMarker(uPos, {color: '#3b82f6', radius: 10, fillOpacity: 0.8}).addTo(map);
            document.getElementById('start-loc').value = "موقعي الحالي";
        });

        // اختيار الوجهة في الخريطة وحساب السعر
        map.on('click', e => {
            dPos = e.latLng;
            if(router) map.removeControl(router);
            router = L.Routing.control({
                waypoints: [L.latLng(uPos[0], uPos[1]), dPos],
                lineOptions: { styles: [{color: '#3b82f6', weight: 8, opacity: 0.8}] },
                createMarker: () => null
            }).on('routesfound', ev => {
                let dist = ev.routes[0].summary.totalDistance / 1000;
                let price = Math.round(dist * 6) + 10; // 6 دراهم للكيلومتر + 10 فتح العداد
                document.getElementById('price-card').classList.remove('hidden');
                document.getElementById('price-val').innerText = price + " DH";
                window.lastPrice = price;
                document.getElementById('end-loc').value = "الوجهة المختارة";
            }).addTo(map);
        });

        function sendOrder() {
            const ph = document.getElementById('phone').value;
            const start = document.getElementById('start-loc').value;
            const end = document.getElementById('end-loc').value;
            if(!ph || !dPos) return alert("اختر وجهتك في الخريطة أولاً!");
            
            const id = "ord_" + Date.now();
            database.ref('orders/' + id).set({ 
                ph, start, end, price: window.lastPrice, 
                lat: uPos[0], lng: uPos[1], dLat: dPos.lat, dLng: dPos.lng, status: 'waiting' 
            });
            
            document.getElementById('status').innerText = "جاري البحث عن أقرب سائق... ⏳";
            document.getElementById('status').classList.remove('hidden');

            database.ref('orders/'+id+'/status').on('value', s => {
                if(s.val() === 'accepted') {
                    document.getElementById('status').innerText = "✅ تم قبول رحلتك! السائق قادم.";
                    document.getElementById('mainBtn').innerText = "الرحلة مقبولة";
                    document.getElementById('mainBtn').className = "w-full bg-green-600 py-5 rounded-2xl font-black text-xl cursor-default";
                }
            });
        }
    </script>
</body>
</html>
