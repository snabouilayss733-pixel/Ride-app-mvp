<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>الراكب - RIDENOW</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-950 text-white p-4">
    <div class="max-w-md mx-auto space-y-4">
        <h1 class="text-3xl font-black text-blue-500 text-center italic">RIDENOW</h1>
        <div id="map" class="h-64 rounded-[2rem] border-4 border-slate-900 shadow-2xl"></div>
        
        <div class="bg-slate-900 p-6 rounded-[2rem] shadow-xl border border-slate-800 space-y-3">
            <input type="text" id="start-loc" placeholder="📍 نقطة الانطلاق (مثلاً: درب السلطان)" class="w-full p-4 bg-slate-800 rounded-2xl border-none text-sm">
            <input type="text" id="end-loc" placeholder="🏁 إلى أين؟ (الوجهة)" class="w-full p-4 bg-slate-800 rounded-2xl border-none text-sm font-bold text-blue-400">
            <input type="tel" id="phone" placeholder="📞 رقم هاتفك" class="w-full p-4 bg-slate-800 rounded-2xl border-none font-mono">
            
            <div id="price-card" class="hidden flex justify-between items-center bg-blue-600/20 p-4 rounded-2xl border border-blue-500/30">
                <span class="font-bold">ثمن الرحلة:</span>
                <span id="price-val" class="text-xl font-black text-blue-400">0 DH</span>
            </div>

            <button onclick="sendOrder()" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-xl active:scale-95 shadow-lg">تأكيد طلب الرحلة 🚕</button>
            <p id="status" class="text-center text-yellow-500 font-bold hidden animate-pulse"></p>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCyRku2u6gIuj6itDb7NXIaF-MtBmMomo", authDomain: "ridenowapp-eadf0.firebaseapp.com", projectId: "ridenowapp-eadf0", databaseURL: "https://ridenowapp-eadf0-default-rtdb.firebaseio.com", storageBucket: "ridenowapp-eadf0.appspot.com", messagingSenderId: "184047350605", appId: "1:184047350605:web:622b9f7d8b4b2af95a7d04" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let map = L.map('map', {zoomControl: false}).setView([33.5731, -7.5898], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let uPos;
        navigator.geolocation.getCurrentPosition(p => {
            uPos = [p.coords.latitude, p.coords.longitude];
            map.setView(uPos, 15);
            L.circleMarker(uPos, {color: '#3b82f6', radius: 8, fillOpacity: 1}).addTo(map);
        });

        map.on('click', e => {
            window.dest = e.latLng;
            let price = Math.floor(Math.random() * 40) + 15; 
            document.getElementById('price-card').classList.remove('hidden');
            document.getElementById('price-val').innerText = price + " DH";
            window.finalPrice = price;
            L.marker(e.latLng).addTo(map);
        });

        function sendOrder() {
            const start = document.getElementById('start-loc').value;
            const end = document.getElementById('end-loc').value;
            const ph = document.getElementById('phone').value;
            if(!start || !end || !ph) return alert("عمر الخانات كاملين!");

            const id = "order_" + Date.now();
            database.ref('orders/' + id).set({
                start, end, ph, price: window.finalPrice || 25,
                lat: uPos[0], lng: uPos[1], status: 'waiting'
            });
            document.getElementById('status').innerText = "جاري البحث عن سائق... ⏳";
            document.getElementById('status').classList.remove('hidden');
        }
    </script>
</body>
</html>
