<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RideNow - دخول</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  
  <div class="bg-white p-8 rounded-2xl shadow-lg w-96">
    <h1 class="text-3xl font-bold text-center mb-6 text-green-600">RideNow</h1>
    
    <!-- شاشة رقم الجوال -->
    <div id="phone-screen">
      <label class="block mb-2 font-semibold">رقم الجوال</label>
      <input id="phone" type="tel" placeholder="05xxxxxxxx" class="w-full p-3 border rounded-lg mb-4 text-left" dir="ltr">
      <button onclick="sendOTP()" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold">أرسل كود الواتساب</button>
    </div>

    <!-- شاشة الكود -->
    <div id="otp-screen" class="hidden">
      <label class="block mb-2 font-semibold">أدخل الكود المرسل واتساب</label>
      <input id="otp" type="text" placeholder="123456" class="w-full p-3 border rounded-lg mb-4 text-center text-2xl tracking-widest" maxlength="6">
      <button onclick="verifyOTP()" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold">تأكيد الدخول</button>
      <button onclick="backToPhone()" class="w-full mt-2 text-gray-500 text-sm">تغيير الرقم</button>
    </div>

    <p id="msg" class="text-center mt-4 text-sm"></p>
  </div>

<script>
// 1. عدل firebaseConfig حقك من Firebase Console > Project Settings
const firebaseConfig = {
  apiKey: "AIzaSyCyRku2u6gIuj6itpDb7NXIaF-MtBmMomo",
  authDomain: "ridenowapp-eadf0.firebaseapp.com",
  databaseURL: "https://ridenowapp-eadf0-default-rtdb.firebaseio.com",
  projectId: "ridenowapp-eadf0",
  storageBucket: "ridenowapp-eadf0.firebasestorage.app",
  messagingSenderId: "184047350605",
  appId: "1:184047350605:web:622b9f7d8b4b2af95a7d04",
  measurementId: "G-H8K5DF4SFG"
};

// 2. بيانات UltraMsg حقتك - جاهزة
const ULTRAMSG_INSTANCE = "instance170099";
const ULTRAMSG_TOKEN = "9mormjnkqumqkkmn";

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentPhone = "";

function showMsg(text, error = false) {
  const msg = document.getElementById('msg');
  msg.textContent = text;
  msg.className = error ? 'text-center mt-4 text-sm text-red-500' : 'text-center mt-4 text-sm text-green-600';
}

async function sendOTP() {
  const phoneInput = document.getElementById('phone').value.trim();
  if (!phoneInput) return showMsg('دخل رقم الجوال', true);
  
  currentPhone = phoneInput.startsWith('+') ? phoneInput : '+966' + phoneInput.replace(/^0/, '');
  const otp = Math.floor(100000 + Math.random() * 900000).toString();
  
  showMsg('جاري إرسال الكود...');
  
  try {
    // حفظ الكود في Firestore لمدة 5 دقايق
    await db.collection('otps').doc(currentPhone).set({
      code: otp,
      created: firebase.firestore.FieldValue.serverTimestamp()
    });

    // إرسال واتساب عبر UltraMsg
    const msg = `مرحباً بك في RideNow 🚗\nكود الدخول: ${otp}\nصالح لمدة 5 دقائق`;
    const url = `https://api.ultramsg.com/${ULTRAMSG_INSTANCE}/messages/chat?token=${ULTRAMSG_TOKEN}&to=${currentPhone}&body=${encodeURIComponent(msg)}`;
    
    const response = await fetch(url);
    const result = await response.json();
    
    if (result.sent === 'true' || result.message === 'ok') {
      document.getElementById('phone-screen').classList.add('hidden');
      document.getElementById('otp-screen').classList.remove('hidden');
      showMsg('تم إرسال الكود واتساب ✅');
    } else {
      throw new Error('فشل الإرسال');
    }
    
  } catch (e) {
    console.error(e);
    showMsg('خطأ في الإرسال. تأكد من الرقم وحالة الـ Instance', true);
  }
}

async function verifyOTP() {
  const userOTP = document.getElementById('otp').value.trim();
  if (!userOTP) return showMsg('دخل الكود', true);
  
  showMsg('جاري التحقق...');
  
  try {
    const doc = await db.collection('otps').doc(currentPhone).get();
    if (!doc.exists) return showMsg('الكود منتهي. اطلب كود جديد', true);
    
    const data = doc.data();
    const now = Date.now();
    const created = data.created.toDate().getTime();
    
    // تحقق من الوقت: 5 دقايق
    if (now - created > 5 * 60 * 1000) {
      await db.collection('otps').doc(currentPhone).delete();
      return showMsg('الكود منتهي. اطلب كود جديد', true);
    }
    
    if (data.code === userOTP) {
      await db.collection('otps').doc(currentPhone).delete();
      localStorage.setItem('user_phone', currentPhone);
      showMsg('تم الدخول بنجاح 🎉');
      setTimeout(() => {
        // غير هذا الرابط لصفحة الرئيسية حقتك
        window.location.href = './home.html'; 
      }, 1000);
    } else {
      showMsg('الكود غلط', true);
    }
  } catch (e) {
    showMsg('خطأ في التحقق', true);
  }
}

function backToPhone() {
  document.getElementById('otp-screen').classList.add('hidden');
  document.getElementById('phone-screen').classList.remove('hidden');
  showMsg('');
}
</script>

</body>
</html>
