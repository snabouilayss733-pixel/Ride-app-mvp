<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>الراكب - RideNow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-900 text-white p-4">
    <div id="map" class="h-64 rounded-2xl mb-4 border border-slate-700"></div>
    <input type="tel" id="phone" placeholder="رقم هاتفك" class="w-full p-4 mb-4 rounded-xl bg-slate-800 border-none">
    <button onclick="sendOrder()" class="w-full bg-blue-600 py-4 rounded-xl font-bold">اطلب الآن</button>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCyRku2u6gIuj6itDb7NXIaF-MtBmMomo", authDomain: "ridenowapp-eadf0.firebaseapp.com", projectId: "ridenowapp-eadf0", databaseURL: "https://ridenowapp-eadf0-default-rtdb.firebaseio.com", storageBucket: "ridenowapp-eadf0.appspot.com", messagingSenderId: "184047350605", appId: "1:184047350605:web:622b9f7d8b4b2af95a7d04" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let map = L.map('map').setView([33.5731, -7.5898], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let userPos;
        navigator.geolocation.getCurrentPosition(p => { userPos = [p.coords.latitude, p.coords.longitude]; map.setView(userPos, 15); L.marker(userPos).addTo(map); });
        function sendOrder() {
            const phone = document.getElementById('phone').value;
            if(phone && userPos) {
                database.ref('orders/' + Date.now()).set({ phone, lat: userPos[0], lng: userPos[1], status: 'waiting' });
                alert("تم إرسال الطلب! السائقين سيظهر لهم موقعك.");
            }
        }
    </script>
</body>
</html>
