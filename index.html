<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>RideNow - اطلب رحلة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        .tracking-card { transition: all 0.5s ease; bottom: -100%; }
        .tracking-card.active { bottom: 0; }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans overflow-hidden">
    <div class="flex flex-col h-screen relative">
        <div id="map" class="flex-grow z-0"></div>

        <div id="request-ui" class="absolute bottom-0 w-full bg-slate-900 p-6 rounded-t-[2.5rem] shadow-2xl border-t border-slate-800 z-10">
            <h1 class="text-2xl font-black text-blue-500 italic text-center mb-4">RIDENOW</h1>
            <div class="space-y-3">
                <input type="text" id="user-name" placeholder="👤 اسمك الكامل" class="w-full p-4 bg-slate-800 rounded-2xl border-none text-sm font-bold">
                <input type="text" id="start-loc" placeholder="📍 نقطة الانطلاق (مثلاً: كازا فواياجور)" class="w-full p-4 bg-slate-800 rounded-2xl border-none text-sm">
                <input type="text" id="end-loc" placeholder="🏁 إلى أين؟ (الوجهة)" class="w-full p-4 bg-slate-800 rounded-2xl border-none text-sm text-blue-400 font-bold">
                <input type="tel" id="phone" placeholder="📞 رقم هاتفك" class="w-full p-4 bg-slate-800 rounded-2xl border-none text-center font-mono">
                
                <div id="price-card" class="hidden flex justify-between items-center bg-blue-600/10 p-4 rounded-2xl border border-blue-500/20">
                    <span class="text-slate-400 text-sm font-bold">الثمن المقترح:</span>
                    <span id="price-val" class="text-2xl font-black text-blue-500">0 DH</span>
                </div>

                <button onclick="sendOrder()" id="main-btn" class="w-full bg-blue-600 py-5 rounded-2xl font-black text-xl active:scale-95 shadow-lg shadow-blue-900/20 transition-all">تأكيد طلب الرحلة 🚕</button>
            </div>
        </div>

        <div id="tracking-ui" class="tracking-card fixed left-0 w-full bg-slate-900 p-6 rounded-t-[2.5rem] shadow-2xl border-t border-blue-500/30 z-20">
            <div class="flex justify-between items-start mb-6">
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 bg-slate-800 rounded-full border-2 border-blue-500 overflow-hidden shadow-lg">
                        <img src="https://ui-avatars.com/api/?name=S&background=0D8ABC&color=fff" alt="Driver" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <h3 class="font-black text-lg text-white">محمد الأمين (السائق)</h3>
                        <p class="text-[10px] text-blue-400 font-bold uppercase tracking-tighter">Dacia Logan - 12-أ-1234</p>
                    </div>
                </div>
                <div class="text-right">
                    <span class="bg-green-600/20 text-green-500 px-3 py-1 rounded-full text-[10px] font-black animate-pulse">السائق في الطريق</span>
                    <p class="text-2xl font-black mt-2 text-white">5 <span class="text-xs text-slate-400">دقائق</span></p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-4">
                <a href="tel:0600000000" class="bg-slate-800 flex flex-col items-center justify-center py-4 rounded-2xl border border-slate-700 active:scale-95">
                    <span class="text-2xl mb-1">📞</span>
                    <span class="text-[10px] font-bold">اتصال</span>
                </a>
                <button onclick="cancelOrder()" class="bg-red-600/10 text-red-500 flex flex-col items-center justify-center py-4 rounded-2xl border border-red-500/20 active:scale-95">
                    <span class="text-2xl mb-1">🚫</span>
                    <span class="text-[10px] font-bold">إلغاء الرحلة</span>
                </button>
            </div>
            
            <div class="p-4 bg-blue-600/10 rounded-2xl border border-blue-500/20 text-center">
                <p class="text-sm font-bold text-blue-400 italic">ثمن المشوار: <span id="final-price-display" class="text-white text-lg">0</span> DH</p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCyRku2u6gIuj6itDb7NXIaF-MtBmMomo", authDomain: "ridenowapp-eadf0.firebaseapp.com", projectId: "ridenowapp-eadf0", databaseURL: "https://ridenowapp-eadf0-default-rtdb.firebaseio.com", storageBucket: "ridenowapp-eadf0.appspot.com", messagingSenderId: "184047350605", appId: "1:184047350605:web:622b9f7d8b4b2af95a7d04" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let map = L.map('map', {zoomControl: false}).setView([33.5731, -7.5898], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let uPos, currentOrderId;

        navigator.geolocation.getCurrentPosition(p => {
            uPos = [p.coords.latitude, p.coords.longitude];
            map.setView(uPos, 15);
            L.circleMarker(uPos, {color: '#3b82f6', radius: 10, fillOpacity: 0.8, weight: 3}).addTo(map);
        });

        map.on('click', e => {
            let price = Math.floor(Math.random() * 30) + 15;
            document.getElementById('price-card').classList.remove('hidden');
            document.getElementById('price-val').innerText = price + " DH";
            window.lastPrice = price;
            L.marker(e.latLng).addTo(map).bindPopup("وجهتك").openPopup();
        });

        function sendOrder() {
            const name = document.getElementById('user-name').value;
            const ph = document.getElementById('phone').value;
            if(!name || !ph) return alert("ضروري تدخل سميتك وتليفونك باش السائق يعرفك!");
            
            currentOrderId = "ord_" + Date.now();
            database.ref('orders/' + currentOrderId).set({
                name: name,
                start: document.getElementById('start-loc').value,
                end: document.getElementById('end-loc').value,
                ph: ph, 
                price: window.lastPrice || 25,
                lat: uPos[0], lng: uPos[1], status: 'waiting'
            });

            document.getElementById('main-btn').innerText = "جاري البحث عن شيفور... ⏳";
            document.getElementById('main-btn').disabled = true;

            // مراقبة قبول السائق للطلب
            database.ref('orders/' + currentOrderId + '/status').on('value', snap => {
                if(snap.val() === 'accepted') {
                    document.getElementById('request-ui').style.display = 'none';
                    document.getElementById('tracking-ui').classList.add('active');
                    document.getElementById('final-price-display').innerText = window.lastPrice || 25;
                }
            });
        }

        function cancelOrder() {
            if(confirm("واش بصح بغيتي تلغي الرحلة؟")) {
                database.ref('orders/' + currentOrderId).update({status: 'cancelled'});
                location.reload();
            }
        }
    </script>
</body>
</html>
