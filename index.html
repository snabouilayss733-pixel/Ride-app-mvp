<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>اطلب مشوارك</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-900 text-white">
  <div id="map" class="h-screen w-full"></div>

  <!-- صندوق الطلب -->
  <div class="fixed bottom-0 left-0 right-0 bg-gray-800 p-4 rounded-t-3xl">
    <h1 class="text-xl font-bold mb-3 text-center">وين ودك تروح؟</h1>
    <input id="pickup" type="text" placeholder="موقع الالتقاط" class="w-full mb-2 p-3 rounded-xl bg-gray-700 text-white" value="موقعي الحالي">
    <input id="dropoff" type="text" placeholder="الوجهة" class="w-full mb-4 p-3 rounded-xl bg-gray-700 text-white">
    <button onclick="requestRide()" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-bold text-lg">اطلب كابتن الآن</button>
    <p id="status" class="text-center mt-3 text-yellow-400 hidden">جاري البحث عن أقرب كابتن...</p>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCyRku2u6gIuj6itDb7NXIaF-MtBmMomo",
      authDomain: "ridenowapp-eadf0.firebaseapp.com",
      databaseURL: "https://ridenowapp-eadf0-default-rtdb.firebaseio.com",
      projectId: "ridenowapp-eadf0",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let map, userMarker;
    let userLat = 24.7136, userLng = 46.6753; // الرياض افتراضي

    // شغل الخريطة
    map = L.map('map').setView([userLat, userLng], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    userMarker = L.marker([userLat, userLng]).addTo(map).bindPopup('أنت هنا').openPopup();

    // جيب موقع الراكب الحقيقي
    navigator.geolocation.getCurrentPosition((pos) => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      map.setView([userLat, userLng], 15);
      userMarker.setLatLng([userLat, userLng]);
    });

    function requestRide() {
      const dropoff = document.getElementById('dropoff').value;
      if (!dropoff) {
        alert('اكتب الوجهة أول');
        return;
      }

      document.getElementById('status').classList.remove('hidden');

      const rideId = db.ref('rides').push().key;
      db.ref('rides/' + rideId).set({
        userName: "راكب",
        pickup: { lat: userLat, lng: userLng },
        dropoff: dropoff,
        price: 30, // سعر ثابت مبدئيا
        status: "searching",
        timestamp: firebase.database.ServerValue.TIMESTAMP
      });

      // استمع لو سائق قبل الطلب
      db.ref('rides/' + rideId).on('value', (snapshot) => {
        const ride = snapshot.val();
        if (ride.status === 'accepted') {
          document.getElementById('status').innerText = 'الكابتن بالطريق إليك!';
        }
      });
    }
  </script>
</body>
</html>
