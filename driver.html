<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>لوحة السائق - RideNow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-950 text-white p-4 font-sans overflow-x-hidden">
    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center bg-slate-900 p-6 rounded-[2rem] border border-slate-800 mb-8 shadow-2xl">
            <h2 class="text-2xl font-black text-green-500 italic">DRIVER MODE</h2>
            <div class="bg-green-600/20 text-green-500 px-4 py-1 rounded-full text-xs font-bold animate-pulse">ON LINE</div>
        </header>

        <div id="list" class="space-y-6">
            </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCyRku2u6gIuj6itDb7NXIaF-MtBmMomo", authDomain: "ridenowapp-eadf0.firebaseapp.com", projectId: "ridenowapp-eadf0", databaseURL: "https://ridenowapp-eadf0-default-rtdb.firebaseio.com", storageBucket: "ridenowapp-eadf0.appspot.com", messagingSenderId: "184047350605", appId: "1:184047350605:web:622b9f7d8b4b2af95a7d04" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('orders').on('value', snap => {
            const list = document.getElementById('list');
            list.innerHTML = '';
            snap.forEach(child => {
                const o = child.val();
                if(o.status === 'waiting') {
                    list.innerHTML += `
                        <div class="bg-slate-900 rounded-[2.5rem] border border-slate-800 shadow-2xl overflow-hidden relative">
                            <div class="bg-green-600 p-4 flex justify-between items-center">
                                <span class="font-black text-2xl">${o.price} DH</span>
                                <span class="text-xs font-bold opacity-80 uppercase tracking-tighter">طلب جديد</span>
                            </div>
                            <div class="p-6 space-y-4">
                                <div class="space-y-2">
                                    <p class="text-xs text-slate-500 font-bold uppercase">من:</p>
                                    <p class="text-blue-400 font-bold">${o.start}</p>
                                </div>
                                <div class="space-y-2 border-t border-slate-800 pt-2">
                                    <p class="text-xs text-slate-500 font-bold uppercase">إلى:</p>
                                    <p class="text-red-400 font-bold">${o.end}</p>
                                </div>
                                <div class="flex gap-2 pt-4">
                                    <button onclick="accept('${child.key}')" class="flex-grow bg-blue-600 py-5 rounded-2xl font-black text-lg active:scale-95 shadow-lg shadow-blue-900/20">قـبول الطلب</button>
                                    <a href="https://www.google.com/maps/dir/?api=1&origin=${o.lat},${o.lng}&destination=${o.dLat},${o.dLng}" target="_blank" class="bg-slate-800 p-5 rounded-2xl flex items-center justify-center">📍</a>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });
        });

        function accept(id) {
            database.ref('orders/' + id).transaction(data => {
                if (data && data.status === 'waiting') {
                    data.status = 'accepted';
                    return data;
                }
                return; 
            }, (err, comm) => {
                if (comm) alert("✅ تمت الموافقة! اتبع الخريطة.");
                else alert("❌ عذراً، سائق آخر سبقك.");
            });
        }
    </script>
</body>
</html>
