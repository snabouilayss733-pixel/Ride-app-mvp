<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>السائق - RideNow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-900 text-white p-4">
    <h1 class="text-xl font-bold mb-6 text-green-400">طلبات الراكب المتاحة</h1>
    <div id="orders-list" class="space-y-4"></div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCyRku2u6gIuj6itDb7NXIaF-MtBmMomo", authDomain: "ridenowapp-eadf0.firebaseapp.com", projectId: "ridenowapp-eadf0", databaseURL: "https://ridenowapp-eadf0-default-rtdb.firebaseio.com", storageBucket: "ridenowapp-eadf0.appspot.com", messagingSenderId: "184047350605", appId: "1:184047350605:web:622b9f7d8b4b2af95a7d04" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        database.ref('orders').on('value', snap => {
            const list = document.getElementById('orders-list');
            list.innerHTML = '';
            snap.forEach(child => {
                const o = child.val();
                if(o.status === 'waiting') {
                    list.innerHTML += `<div class="bg-slate-800 p-4 rounded-xl border-l-4 border-blue-500">
                        <p>هاتف: ${o.phone}</p>
                        <a href="https://www.google.com/maps?q=${o.lat},${o.lng}" target="_blank" class="text-blue-400 underline">عرض موقع الراكب 📍</a>
                        <button onclick="database.ref('orders/${child.key}').update({status:'accepted'})" class="w-full mt-2 bg-green-600 py-2 rounded-lg">قبول</button>
                    </div>`;
                }
            });
        });
    </script>
</body>
</html>
