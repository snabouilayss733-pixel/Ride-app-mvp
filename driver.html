<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>RIDENOW - الكابتن</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-950 text-white">
    <div id="sound-fix" class="fixed inset-0 bg-black z-[100] flex items-center justify-center">
        <button onclick="initDriver()" class="bg-yellow-500 p-6 rounded-2xl text-black font-black">تشغيل نظام الكابتن 🔔</button>
    </div>

    <div id="map" class="h-screen w-full"></div>
    <div id="driver-ui" class="fixed bottom-0 w-full bg-slate-900 p-6 rounded-t-[3rem] border-t border-yellow-500/30">
        <div id="waiting-msg" class="text-center animate-pulse text-slate-500">بانتظار طلبات جديدة...</div>
        <div id="order-card" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 id="customer-name" class="text-2xl font-black text-white">---</h2>
                <span id="order-price" class="text-2xl font-black text-yellow-500">0 SAR</span>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <button id="nav-btn" class="bg-blue-600 py-4 rounded-xl">📍 موقع الراكب</button>
                <button onclick="acceptOrder()" class="bg-green-600 py-4 rounded-xl font-bold">قبول الطلب ✅</button>
            </div>
            <button onclick="finishTrip()" id="finish-btn" class="hidden w-full bg-yellow-600 mt-2 py-4 rounded-xl text-black font-black">إنهاء المشوار 🏁</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCyRku2u6gIuj6itDb7NXIaF-MtBmMomo", authDomain: "ridenowapp-eadf0.firebaseapp.com", projectId: "ridenowapp-eadf0", databaseURL: "https://ridenowapp-eadf0-default-rtdb.firebaseio.com", storageBucket: "ridenowapp-eadf0.appspot.com", messagingSenderId: "184047350605", appId: "1:184047350605:web:622b9f7d8b4b2af95a7d04" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let map = L.map('map', {zoomControl: false}).setView([24.7136, 46.6753], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        let dId = "driver_" + Math.floor(Math.random()*1000);
        let audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');
        let currentOrderId;

        function initDriver() {
            document.getElementById('sound-fix').remove();
            navigator.geolocation.watchPosition(p => {
                const pos = { lat: p.coords.latitude, lng: p.coords.longitude };
                map.setView([pos.lat, pos.lng], 15);
                database.ref('drivers_online/' + dId).set(pos);
            });
        }

        database.ref('orders').on('value', snap => {
            snap.forEach(child => {
                const o = child.val();
                if(o.status === 'waiting') {
                    audio.play();
                    currentOrderId = child.key;
                    document.getElementById('waiting-msg').classList.add('hidden');
                    document.getElementById('order-card').classList.remove('hidden');
                    document.getElementById('customer-name').innerText = o.name;
                    document.getElementById('order-price').innerText = o.price + " SAR";
                    document.getElementById('nav-btn').onclick = () => window.open(`https://www.google.com/maps?q=${o.lat},${o.lng}`);
                }
            });
        });

        function acceptOrder() {
            database.ref('orders/' + currentOrderId).update({status: 'accepted'});
            document.getElementById('finish-btn').classList.remove('hidden');
        }

        function finishTrip() {
            database.ref('orders/' + currentOrderId).update({status: 'completed'});
            location.reload();
        }
    </script>
</body>
</html>
