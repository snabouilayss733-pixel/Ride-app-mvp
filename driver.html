<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة السائق - RideNow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-900 text-white p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-black text-green-400 mb-6 flex items-center justify-between">
            متصل الآن (استقبال الطلبات) 🟢
        </h1>
        <div id="orders-list" class="space-y-4">
            </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCyRku2u6gIuj6itDb7NXIaF-MtBmMomo",
            authDomain: "ridenowapp-eadf0.firebaseapp.com",
            projectId: "ridenowapp-eadf0",
            databaseURL: "https://ridenowapp-eadf0-default-rtdb.firebaseio.com",
            storageBucket: "ridenowapp-eadf0.appspot.com",
            messagingSenderId: "184047350605",
            appId: "1:184047350605:web:622b9f7d8b4b2af95a7d04"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('orders').on('value', snap => {
            const list = document.getElementById('orders-list');
            list.innerHTML = '';
            snap.forEach(child => {
                const o = child.val();
                if(o.status === 'waiting') {
                    list.innerHTML += `
                        <div class="bg-slate-800 p-6 rounded-3xl border-l-8 border-green-500 shadow-2xl">
                            <div class="flex justify-between items-center mb-4">
                                <span class="bg-green-600 px-3 py-1 rounded-full font-black">${o.price} DH</span>
                                <a href="https://www.google.com/maps/dir/?api=1&origin=${o.lat},${o.lng}&destination=${o.dLat},${o.dLng}" target="_blank" class="text-blue-400 text-sm underline">فتح الخريطة 📍</a>
                            </div>
                            <p class="text-sm text-slate-400">هاتف الراكب: ${o.phone}</p>
                            <button onclick="takeOrder('${child.key}')" class="w-full mt-4 bg-green-600 py-3 rounded-2xl font-bold active:scale-95">قبول الرحلة ✅</button>
                        </div>
                    `;
                }
            });
        });

        function takeOrder(id) {
            // نظام الترانسأكشن: كيمنع جوج سائقين يقبلو نفس الطلب
            database.ref('orders/' + id).transaction(data => {
                if(data && data.status === 'waiting') {
                    data.status = 'accepted';
                    return data;
                }
                return; // الطلب لم يعد متاحاً
            }, (error, committed) => {
                if(committed) alert("مبروك! الرحلة لك. تواصل مع الراكب.");
                else alert("للأسف، سائق آخر سبقك لهذا الطلب 🏃‍♂️");
            });
        }
    </script>
</body>
</html>
