<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>لوحة السائق</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-950 text-white p-4">
    <div class="max-w-md mx-auto">
        <h2 class="text-2xl font-black text-green-500 mb-6 border-b border-slate-800 pb-4">الطلبات المتاحة 🟢</h2>
        <div id="list" class="space-y-4"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCyRku2u6gIuj6itDb7NXIaF-MtBmMomo", authDomain: "ridenowapp-eadf0.firebaseapp.com", projectId: "ridenowapp-eadf0", databaseURL: "https://ridenowapp-eadf0-default-rtdb.firebaseio.com", storageBucket: "ridenowapp-eadf0.appspot.com", messagingSenderId: "184047350605", appId: "1:184047350605:web:622b9f7d8b4b2af95a7d04" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('orders').on('value', snap => {
            const list = document.getElementById('list');
            list.innerHTML = '';
            snap.forEach(child => {
                const o = child.val();
                if(o.status === 'waiting') {
                    list.innerHTML += `
                        <div class="bg-slate-900 p-6 rounded-[2rem] border border-slate-800 shadow-2xl relative overflow-hidden">
                            <div class="absolute top-0 left-0 bg-green-600 px-6 py-2 rounded-br-3xl font-black text-xl">${o.price} DH</div>
                            <div class="mt-8 space-y-2">
                                <p class="text-sm text-slate-500 font-bold tracking-widest">تفاصيل الرحلة:</p>
                                <p class="text-white"><span class="text-blue-400">📍 من:</span> ${o.start}</p>
                                <p class="text-white"><span class="text-red-400">🏁 إلى:</span> ${o.end}</p>
                                <p class="text-xl font-mono mt-4 text-green-400">📞 ${o.ph}</p>
                            </div>
                            <div class="flex gap-2 mt-6">
                                <button onclick="accept('${child.key}')" class="flex-grow bg-blue-600 py-4 rounded-xl font-bold active:scale-95">قبول ✅</button>
                                <a href="https://www.google.com/maps?q=${o.lat},${o.lng}" target="_blank" class="bg-slate-800 p-4 rounded-xl flex items-center">📍 موقع الراكب</a>
                            </div>
                        </div>
                    `;
                }
            });
        });

        function accept(id) {
            database.ref('orders/' + id).update({status: 'accepted'});
            alert("تم قبول الطلب! تواصل مع الراكب.");
        }
    </script>
</body>
</html>
