<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة السائق - RideNow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-900 text-white p-4">
    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-8 bg-slate-800 p-4 rounded-2xl shadow-lg border border-slate-700">
            <div>
                <h1 class="text-xl font-bold text-blue-400">لوحة السائق</h1>
                <p id="status-text" class="text-xs text-red-500 font-bold">الحالة: غير متصل</p>
            </div>
            <button onclick="toggleStatus()" id="status-btn" class="bg-red-500 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg transition-all">
                تفعيل الاتصال
            </button>
        </div>

        <h2 class="text-lg font-bold mb-4 flex items-center">الطلبات الحالية</h2>
        <div id="orders-list" class="space-y-4">
            <p id="no-orders" class="text-slate-500 text-center py-10">قم بتفعيل الاتصال لاستقبال الطلبات.</p>
        </div>
    </div>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyCyRku2u6gIuj6itDb7NXIaF-MtBmMomo",
            authDomain: "ridenowapp-eadf0.firebaseapp.com",
            projectId: "ridenowapp-eadf0",
            databaseURL: "https://ridenowapp-eadf0-default-rtdb.firebaseio.com",
            storageBucket: "ridenowapp-eadf0.appspot.com",
            messagingSenderId: "184047350605",
            appId: "1:184047350605:web:622b9f7d8b4b2af95a7d04"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let isOnline = false;

        function toggleStatus() {
            const btn = document.getElementById('status-btn');
            const statusText = document.getElementById('status-text');
            isOnline = !isOnline;

            if (isOnline) {
                btn.innerText = "إيقاف الاتصال";
                btn.className = "bg-green-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg transition-all";
                statusText.innerText = "الحالة: متصل (استقبال الطلبات)";
                statusText.className = "text-xs text-green-500 font-bold";
                listenForOrders();
            } else {
                location.reload(); // إعادة تحميل الصفحة لإيقاف الاتصال
            }
        }

        function listenForOrders() {
            database.ref('orders').on('value', (snapshot) => {
                const ordersList = document.getElementById('orders-list');
                ordersList.innerHTML = '';
                
                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        const order = childSnapshot.val();
                        const orderHtml = `
                            <div class="bg-slate-800 p-5 rounded-2xl border-r-4 border-blue-500 shadow-md mb-4">
                                <p class="text-sm text-slate-300">الوجهة:</p>
                                <p class="text-lg text-white font-bold mb-3">${order.destination}</p>
                                <p class="text-sm text-blue-400 font-bold mb-4">📞 ${order.phone}</p>
                                <button onclick="alert('اتصل بالزبون: ${order.phone}')" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">اتصال بالراكب</button>
                            </div>
                        `;
                        ordersList.innerHTML += orderHtml;
                    });
                } else {
                    ordersList.innerHTML = '<p class="text-slate-500 text-center py-10">لا توجد طلبات حالياً.</p>';
                }
            });
        }
    </script>
</body>
</html>
