<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة السائق - RideNow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-900 text-white p-4">

    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-8 bg-slate-800 p-4 rounded-2xl shadow-lg">
            <div>
                <h1 class="text-xl font-bold text-blue-400">لوحة السائق</h1>
                <p id="status-text" class="text-xs text-red-500 font-bold">الحالة: غير متصل</p>
            </div>
            <button onclick="toggleStatus()" id="status-btn" class="bg-red-500 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg transition-all">
                تفعيل الاتصال
            </button>
        </div>

        <h2 class="text-lg font-bold mb-4 flex items-center">
            <span class="relative flex h-3 w-3 ml-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span>
            </span>
            الطلبات المتاحة حالياً
        </h2>

        <div id="orders-list" class="space-y-4">
            <p id="no-orders" class="text-slate-500 text-center py-10">لا توجد طلبات نشطة حالياً. ابقَ متصلاً لاستقبال الرحلات.</p>
        </div>
    </div>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyCyRku2u6gIuj6itDb7NXIaF-MtBmMomo",
            authDomain: "ridenowapp-eadf0.firebaseapp.com",
            projectId: "ridenowapp-eadf0",
            databaseURL: "https://ridenowapp-eadf0-default-rtdb.firebaseio.com",
            storageBucket: "ridenowapp-eadf0.appspot.com",
            messagingSenderId: "184047350605",
            appId: "1:184047350605:web:622b9f7d8b4b2af95a7d04"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let isOnline = false;

        function toggleStatus() {
            const btn = document.getElementById('status-btn');
            const statusText = document.getElementById('status-text');
            isOnline = !isOnline;

            if (isOnline) {
                btn.innerText = "إيقاف الاتصال";
                btn.className = "bg-green-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg transition-all";
                statusText.innerText = "الحالة: متصل (استقبال الطلبات)";
                statusText.className = "text-xs text-green-500 font-bold";
                listenForOrders();
            } else {
                btn.innerText = "تفعيل الاتصال";
                btn.className = "bg-red-500 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg transition-all";
                statusText.innerText = "الحالة: غير متصل";
                statusText.className = "text-xs text-red-500 font-bold";
                document.getElementById('orders-list').innerHTML = '<p class="text-slate-500 text-center py-10">قم بتفعيل الاتصال لرؤية الطلبات.</p>';
            }
        }

        function listenForOrders() {
            const ordersRef = database.ref('orders');
            ordersRef.on('value', (snapshot) => {
                const ordersList = document.getElementById('orders-list');
                const noOrders = document.getElementById('no-orders');
                ordersList.innerHTML = '';
                
                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        const order = childSnapshot.val();
                        const orderHtml = `
                            <div class="bg-slate-800 p-5 rounded-2xl border-r-4 border-blue-500 shadow-md">
                                <div class="flex justify-between mb-2">
                                    <span class="bg-blue-900 text-blue-200 text-[10px] px-2 py-1 rounded">طلب جديد</span>
                                    <span class="font-bold text-green-400 text-sm">25.00 درهم</span>
                                </div>
                                <p class="text-sm text-slate-300">📍 من: حي النرجس</p>
                                <p class="text-sm text-white font-bold mb-4">🏁 إلى: ${order.destination}</p>
                                <div class="grid grid-cols-2 gap-2">
                                    <button onclick="acceptOrder('${order.phone}')" class="bg-blue-600 text-white py-2 rounded-xl text-xs font-bold">قبول</button>
                                    <button class="bg-slate-700 text-slate-300 py-2 rounded-xl text-xs font-bold">تجاهل</button>
                                </div>
                            </div>
                        `;
                        ordersList.innerHTML += orderHtml;
                    });
                } else {
                    ordersList.innerHTML = '<p class="text-slate-500 text-center py-10">لا توجد طلبات حالياً.</p>';
                }
            });
        }

        function acceptOrder(phone) {
            alert("تم قبول الرحلة! اتصل بالراكب الآن: " + phone);
        }
    </script>
</body>
</html>
