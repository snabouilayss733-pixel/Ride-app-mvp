<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>نظام الكابتن</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-black text-white">
  <div id="start-screen" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center p-6 text-center">
    <div>
      <h1 class="text-3xl font-black mb-6">نظام الكابتن</h1>
      <button onclick="startDriver()" class="bg-yellow-500 text-black px-12 py-5 rounded-2xl font-black text-2xl">ابدأ العمل</button>
    </div>
  </div>

  <div id="map" class="h-screen w-full"></div>

  <!-- بوب اب الطلب الجديد -->
  <div id="order-popup" class="hidden fixed bottom-10 left-4 right-4 bg-slate-900 border-2 border-yellow-500 p-6 rounded-3xl z-[100]">
    <h2 class="text-2xl font-black mb-2">طلب جديد 🚕</h2>
    <p id="c-details" class="text-lg mb-2">من الملز إلى العليا</p>
    <p id="c-price" class="text-3xl font-black text-yellow-500 mb-4">30 SAR</p>
    <button id="accept-btn" class="w-full bg-green-600 py-4 rounded-xl font-bold text-xl">قبول الطلب</button>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCyRku2u6gIuj6itDb7NXIaF-MtBmMomo",
      authDomain: "ridenowapp-eadf0.firebaseapp.com",
      databaseURL: "https://ridenowapp-eadf0-default-rtdb.firebaseio.com",
      projectId: "ridenowapp-eadf0",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let driverId = null, map, driverMarker;

    function startDriver() {
      document.getElementById('start-screen').classList.add('hidden');
      driverId = db.ref('drivers').push().key;

      map = L.map('map').setView([24.7136, 46.6753], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
      driverMarker = L.marker([24.7136, 46.6753]).addTo(map).bindPopup('أنت');

      // تتبع موقع السائق
      navigator.geolocation.watchPosition((pos) => {
        const lat = pos.coords.latitude, lng = pos.coords.longitude;
        driverMarker.setLatLng([lat, lng]);
        db.ref('drivers/' + driverId).set({
          lat: lat, lng: lng, available: true, name: "كابتن محمد"
        });
      });

      // استمع للطلبات الجديدة
      db.ref('rides').orderByChild('status').equalTo('searching').on('child_added', (snapshot) => {
        const ride = snapshot.val();
        const rideId = snapshot.key;

        document.getElementById('order-popup').classList.remove('hidden');
        document.getElementById('c-details').innerText = `إلى: ${ride.dropoff}`;
        document.getElementById('c-price').innerText = ride.price + ' SAR';

        document.getElementById('accept-btn').onclick = () => {
          db.ref('rides/' + rideId).update({ status: 'accepted', driverId: driverId });
          db.ref('drivers/' + driverId).update({ available: false });
          document.getElementById('order-popup').classList.add('hidden');
          alert('تم قبول الطلب. توجه لنقطة الالتقاط');
        };
      });
    }
  </script>
</body>
</html>
